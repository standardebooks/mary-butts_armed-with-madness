		<section id="chapter-12" epub:type="chapter">
			<h2 epub:type="ordinal z3998:roman">XII</h2>
			<p>After an accident in the sea with a small octopus he would sooner have avoided, Carston returned to the house. Felix had not talked to him, said that it would be wiser not to talk, because there might be big magic about. Could not Carston feel it cooking up? Convinced that the boy was enjoying himself, he went up to his room. And what was there to do but think of those two, up somewhere high in air, kissing, or finding some strangeness in Nature and forgetting to kiss. He lay staring and fretting, until with slow alarm growing like a dream, he saw the lost cup, by itself, on the end of his mantelpiece. And earlier in the day, they had passed in and out of his room looking for it there.</p>
			<p>His first impulse was to run downstairs with it, crying. Crossing the room to take it, he slipped on the glassy boards, and the fall and anger from pain turned him. He did not want to touch it. There might be something about it after all. Working a splinter out of his hand, it occurred to him that they had put it there; that the morning had been a farce played for his benefit, a vile joke to make a fool of him. Those people who made love under his eyes, who had lost him on a moor. They had not let him into their lives. They would not believe his innocence. Under the shock of his fall, his imagination galloped reeling. He felt very lonely. He was very lonely. It did not cross his head that they would believe what he told them. Still less that it did not matter whether they believed him or not. Behind this, a dead fever reviving in the blood, was the literal fear of the cup, that it was uncanny, taboo. He passed a dreadful minute, staring at its impressive antiquity. His sensitive intelligence raced through a variety of panics, till the shock of his fall subsided and he began to arrange alternatives. To go down to tea with the cup and say: “I found it in my room. I don’t know how it got there.”</p>
			<p>To hide it in his baggage. In the house. To put it somewhere⁠—say, in Picus’s room. To destroy it.</p>
			<p>The first would make a fool of him, the second a thief, the third impossible, the fourth a trickster; the fifth might bring him to a bad end. This was what had come of his nosing round for power. Scylla would be coming in, burnt with kisses. Perhaps she had played off this trick on him. How many years had he been living in this Chinese box of tricks? If he could have believed in their belief of the possibility of a possible sanctity, gone down to them and said: “Here is something that may be precious,” he would have walked into their hearts. But that would not have served him, because he did not want their hearts. Did not want hearts. Wanted scalps.</p>
			<p>On a final sweep of rage he went downstairs with a cup in his hands to Felix and Clarence and Ross. He said: “Here’s your cup. I should like to know which of you played this off on me. I should like to know who put it in my room.”</p>
			<p>“Oopsey daisy,” said Felix.</p>
			<p>“If that’s your notion of hospitality, it doesn’t coincide with mine.”</p>
			<p>Clarence said: “If you don’t like us, what d’you come down here for?”</p>
			<p>“What we mean, is,” said Ross, “that we don’t understand why you should think such a thing.”</p>
			<p>“Are you trying it out on me that the thing got there by itself, and that none of you knew?” Felix said:</p>
			<p>“If we had known, why should we have spent a morning perspiring over it?”</p>
			<p>Carston cried at him:</p>
			<p>“I’d not put it past you. The day I turn my back on you all will be the best I’ve spent. I can tell people then what I think of you.”</p>
			<p>Felix answered: “And we might as well tell the world that your thirst for antiquities led you to steal a family chalice. Nice kind of mind you’ve got. You know none of us put it in your room.” That was what he did not know. What he could not have done, others could do. There was a stupid, broken pause. Then he said, who had had time to think:</p>
			<p>“I suppose the alliance between Miss Taverner and <abbr epub:type="z3998:name-title">Mr.</abbr> Tracy explains it.”</p>
			<p>“What alliance explains what?”</p>
			<p>Carston looked at the brother; felt like a man pulling up blinds.</p>
			<p>“Love made them mischievous, I suppose.”</p>
			<p>“What love?”</p>
			<p>Warm, sunburnt, they came in. They were in the room, leaning on their ashplants, serene, apart. After a silence, “What’s wrong?” said Scylla.</p>
			<p>“The cup’s turned up,” said Ross, “in Carston’s bedroom. Did either of you put it there?”</p>
			<p>Knowing Picus behind her, she laughed. Lovers’ jokes are sacred, pleasantries of a man who discovers the sea-wood, the rock soft with birds, the meeting of pure water and salt. Come down out of that to enchant and rule her equals.</p>
			<p>“Count us out,” she said. “What’s biting you, Carston?”</p>
			<p>If she had shown a little decent concern it might have recalled him. But he went on:</p>
			<p>“Then I suppose your friend did it. Not content with keeping me awake all night.”</p>
			<p>They stared at him. Clarence was practically invisible with frightful emotion.</p>
			<p>“Put what where?” said Picus, laughing.</p>
			<p>“Four mysteries,” said Carston, “since I got here. First, you found that thing. Then Tracy vanished, after leading us a dance in an infernal prairie. Then the thing vanished. Then it’s found in my room. I’m waiting your explanations. I’ve gotten my own.”</p>
			<p>“Let’s hear ’em,” said Ross.</p>
			<p>Scylla spoke: “It is my cup. My lover who gave it me. We who have enjoyed it. Carston can think what he likes. I did not put it in his room. It is he who will not play. If he wants to find out what has happened, he will find out. We will tell him when we know. Which we don’t at present. Don’t be a fool, man. No one has tried to trick you here.”</p>
			<p>All fairly true, but Picus had done something. Just a little devilry. Her heart caught at a beat, she tasted something in her mouth, salt like pain. Pain so soon after. Other side of the halfpenny. She sneered and sat down, tapping the bright boards with her stick.</p>
			<p>Carston felt disintegrating, sticky, a loser, afraid. Still standing, he stared out at the wood, at the ilex-limb, each leaf a white-fire flame. He became aware of all the noises of the wood, that it was cackling all the time, a frightful old long gossip about dirt and the dead ends of lies. His subtle brain raced on, took a glorious chance. He said:</p>
			<p>“I can tell you something then. Tracy has a book up in his room. On somebody’s collection of early church ornaments. He brought the cup down from London to work this off on you all. You remember how he stunted his ignorance? Just a little game to make you think something of yourselves and let you down. You may like being kidded. I don’t. I reckon I’ve done you a service⁠—”</p>
			<p>“Bright idea,” said Felix. “True, Picus?” He flew at them, with the menaces of a bird.</p>
			<p>“What d’you mean? Scylla’s been talking. You are all a pack of old women intriguing against me. Making my life hell. Like Carston, I’m sick of your hospitality. Especially when it includes him.”</p>
			<p>“ <em>Our hospitality</em>,” said Felix. Quotation wasted on Picus, caught Carston.</p>
			<p>“Yes, a decent vendetta would be better than your poisoned fun.”</p>
			<p>“We don’t seem to have cleaned up anything,” said Clarence.</p>
			<p>“Cleaned up,” said Picus, chattering at them. “Accusing me. Boring me. Interfering with me.” In this there was something that was not comic, in the dis‑ease he imparted.</p>
			<p>“An aborted thunderstorm,” said Scylla. “I’m going up to change.”</p>
			<p>Five left, hating each other. Then Felix modestly, like the youngest: “I’ll go down the wood, and see about the dinner fish.” Four left. “Work to do,” said Ross. Three left. “Have you a time table?” said Carston. Clarence said: “Hadn’t you better stay till we know the truth?” Carston turned his back on him, and went out neatly through the library door. Two left.</p>
			<p>“What is this about you and Scylla?”</p>
			<p>“I suppose I am free to sleep with whom I like?”</p>
			<p>“Why her?”</p>
			<p>“Why not? You don’t want her.”</p>
			<p>“God, no. But you might have told me.”</p>
			<p>“I thought I heard her tell you.”</p>
			<p>“So you and Scylla are one voice then?”</p>
			<p>Picus laughed again. “She shouldn’t have told.” Clarence smiled back at him faintly, as if he had to smile under pain, his own, anyone’s. And Picus chattered on, all of him dancing together, subtle, venomous, absurd.</p>
			<p>Clarence listened, till the time came when he could listen no longer, and hid his face, the awful pain rising in him, drowning Picus’s presence. And he was thankful for it. Escape into infinite suffering, a deadly grey land, and he was thankful for it. Away from Picus forever. Not even to meet the true Picus, but to the country where there was no Picus. When that had gone away forever. That nerve dead. <em>Free among the dead.</em> He raced away on that black heath. Of course, the place where Picus had lost them the day before. But that country had been sapphire and purple, wild with bees. He was out there now in December.</p>
			<blockquote epub:type="z3998:verse">
				<p>
					<span>The North cannot undo them.</span>
					<br/>
					<span>With a sleepy whistle through them.</span>
				</p>
			</blockquote>
			<p>True for trees, but what about the “gentle girl and boy”? He had hidden himself a long time in the pain.</p>
			<p>When he took his hands away from his face, Picus had gone.</p>
